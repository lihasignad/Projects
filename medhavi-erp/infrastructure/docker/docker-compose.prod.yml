services:
  api:
    build: { context: ../.., dockerfile: backend/api/Dockerfile }
    env_file: ../../.env
    environment:
      POSTGRES_HOST: postgres
      MONGO_HOST: mongo
      REDIS_HOST: redis
      DATABASE_URL: postgresql://medhavi:[REDACTED]@postgres:5432/medhavi_erp?schema=public
      MONGODB_URI: mongodb://medhavi:[REDACTED]@mongo:27017/medhavi_logs?authSource=admin
      REDIS_URL: redis://redis:6379
      S3_ENDPOINT: http://minio:9000
      NODE_ENV: production
    depends_on:
      postgres:
        condition: service_healthy
      mongo:
        condition: service_started
      redis:
        condition: service_started
    ports: ["4000:4000"]
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:4000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  worker:
    build: { context: ../.., dockerfile: backend/worker/Dockerfile }
    env_file: ../../.env
    environment:
      POSTGRES_HOST: postgres
      MONGO_HOST: mongo
      REDIS_HOST: redis
      DATABASE_URL: postgresql://medhavi:[REDACTED]@postgres:5432/medhavi_erp?schema=public
      MONGODB_URI: mongodb://medhavi:[REDACTED]@mongo:27017/medhavi_logs?authSource=admin
      REDIS_URL: redis://redis:6379
      NODE_ENV: production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped

  web:
    build: { context: ../.., dockerfile: frontend/web/Dockerfile }
    env_file: ../../.env
    environment:
      NEXT_PUBLIC_API_URL: http://api:4000
      NODE_ENV: production
    depends_on:
      api:
        condition: service_healthy
    ports: ["3000:3000"]
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    depends_on:
      api:
        condition: service_healthy
      web:
        condition: service_started
    ports: ["80:80", "443:443"]
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
    restart: unless-stopped
